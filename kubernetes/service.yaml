apiVersion: v1
kind: Service
metadata:
  name: apexsaas-erp-service
  namespace: production
  labels:
    app: apexsaas-erp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: apexsaas-erp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apexsaas-erp-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: erp.apexsaas.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apexsaas-erp-service
                port:
                  number: 80
  tls:
    - hosts:
        - erp.apexsaas.cloud
      secretName: apexsaas-tls-cert
