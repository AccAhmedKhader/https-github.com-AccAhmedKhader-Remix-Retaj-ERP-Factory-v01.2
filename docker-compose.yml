version: "3.8"

services:
  erp-app-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_app_prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MIGRATION_DATABASE_URL=postgresql://db_user_prod:${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD must be set in your .env file}@postgres-db:5432/erp_production
      - DATABASE_URL=postgresql://${APP_DB_USER:?ERROR: APP_DB_USER must be set in your .env file}:${APP_DB_PASSWORD:?ERROR: APP_DB_PASSWORD must be set in your .env file}@postgres-db:5432/erp_production
      - REDIS_URL=redis://redis-cache:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY must be set in your .env file}
      - JWT_SECRET=${JWT_SECRET:?ERROR: JWT_SECRET must be set in your .env file}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?ERROR: JWT_REFRESH_SECRET must be set in your .env file}
      - AUDIT_SIGNING_SECRET=${AUDIT_SIGNING_SECRET:?ERROR: AUDIT_SIGNING_SECRET must be set in your .env file}
    depends_on:
      - postgres-db
      - redis-cache
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  postgres-db:
    image: postgres:15-alpine
    container_name: erp_db_prod
    environment:
      POSTGRES_USER: db_user_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD must be set in your .env file}
      POSTGRES_DB: erp_production
    volumes:
      - postgres_volume_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user_prod -d erp_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: erp_redis_prod
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    volumes:
      - redis_volume_data:/data

  prometheus-telemetry:
    image: prom/prometheus:latest
    container_name: erp_prometheus_prod
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

volumes:
  postgres_volume_data:
  redis_volume_data:
