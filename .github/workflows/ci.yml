name: ApexSaaS ERP CI/CD Foundation Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    name: Code Audit and Security Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js Runtime
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Run TypeScript Compiler (Type Verification)
      run: npm run lint

    - name: Run Full Vitest Test Suite (Core and Front-end)
      env:
        JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
        JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
        DATABASE_URL: "" # Will fallback to local isolated memory PGlite
      run: |
        npm run test
        npm run test:isolation

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  build-and-package:
    name: Multi-stage Containerization Build
    needs: static-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Production Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: apex-erp-saas:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Start Docker Compose Stack for E2E Tests
      env:
        POSTGRES_PASSWORD: "ci_test_postgres_pwd_123"
        APP_DB_USER: "db_user_prod"
        APP_DB_PASSWORD: "ci_test_app_db_pwd_123"
        GEMINI_API_KEY: "ci_test_gemini_key_123"
        JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
        JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
        AUDIT_SIGNING_SECRET: ${{ secrets.CI_AUDIT_SIGNING_SECRET }}
      run: |
        docker-compose up --build -d

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E Suite
      env:
        PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        TEST_JWT_TOKEN: ${{ secrets.CI_JWT_SECRET }}
      run: |
        npm run test:e2e
