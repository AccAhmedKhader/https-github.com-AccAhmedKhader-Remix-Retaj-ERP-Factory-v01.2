name: ApexSaaS ERP CI/CD Foundation Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    name: Code Audit and Security Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js Runtime
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Run TypeScript Compiler (Type Verification)
      run: npm run lint

    - name: Run Full Vitest Test Suite (Core and Front-end)
      env:
        JWT_SECRET: "CI_TEST_JWT_SECRET_KEY_PLACEHOLDER_48_BYTES_SECURE_KEY_123"
        JWT_REFRESH_SECRET: "CI_TEST_JWT_REFRESH_SECRET_KEY_PLACEHOLDER_48_BYTES_SECURE_KEY_456"
        DATABASE_URL: "" # Will fallback to local isolated memory PGlite
      run: |
        npm run test
        npm run test:isolation

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  build-and-package:
    name: Multi-stage Containerization Build
    needs: static-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Production Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: apex-erp-saas:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
